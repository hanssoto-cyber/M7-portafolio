{% extends 'base.html' %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}
<h2>¿Eliminar producto?</h2>
<p>Estás a punto de eliminar <strong>{{ producto.nombre }}</strong>. Esta acción no se puede deshacer.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'catalogo:listar_productos' %}">Cancelar</a>
</form>
{% endblock %}
