{% extends 'base.html' %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}
<h2 class="mb-3">¿Eliminar producto?</h2>
<div class="alert alert-warning">
    Estás a punto de eliminar <strong>{{ producto.nombre }}</strong>. Esta acción no se puede deshacer.
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'catalogo:listar_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
